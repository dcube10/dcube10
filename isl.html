<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISL Live Updates</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b132b;
    color: white;
}

header {
    background: #1c2541;
    padding: 15px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}

.container {
    padding: 15px;
}

.match {
    background: #3a506b;
    margin: 10px 0;
    padding: 15px;
    border-radius: 10px;
}

.live {
    color: yellow;
    font-weight: bold;
}

button {
    background: #5bc0be;
    border: none;
    padding: 10px;
    border-radius: 5px;
    cursor: pointer;
}

/* Mobile responsive */
@media (max-width: 600px) {
    header {
        font-size: 18px;
    }
}
</style>
</head>

<body>

<header>⚽ ISL Live Updates</header>

<div class="container" id="matches">
    <div class="match">
        <div class="live">LIVE</div>
        <h3>ATK Mohun Bagan vs Kerala Blasters</h3>
        <p>Score: 2 - 1</p>
    </div>

    <div class="match">
        <div class="live">LIVE</div>
        <h3>FC Goa vs Mumbai City FC</h3>
        <p>Score: 1 - 1</p>
    </div>
</div>

<div class="container">
    <button onclick="refreshData()">Refresh Updates</button>
</div>

<script>
function refreshData() {
    alert("Fetching latest ISL updates...");
    // Later you can connect real API here
}
</script>

</body>
</html>
